name: Build and Push WebSafety 9.7

on:
  push:
    branches:
      - '9.7'  # Se déclenche quand tu pousses sur cette branche
  workflow_dispatch: # Permet de lancer le build manuellement via l'interface GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # Étape magique pour passer le nom en minuscule
      - name: Prepare Repository Name
        id: prep
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          push: true
          # On utilise maintenant la variable d'environnement créée au-dessus
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:9.7
            ghcr.io/${{ env.REPO_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
