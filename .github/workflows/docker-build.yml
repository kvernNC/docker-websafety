name: Build and Push WebSafety 9.7

on:
  push:
    branches:
      - '9.7'  # Se déclenche quand tu pousses sur cette branche
  workflow_dispatch: # Permet de lancer le build manuellement via l'interface GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx permet de builder des images multi-plateformes si besoin

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Le contexte reste la racine (.) pour que Docker voit tout le projet
          context: . 
          # On indique explicitement où se trouve le Dockerfile
          file: ./src/Dockerfile 
          push: true
          # On remplace par tes tags 9.7
          tags: |
            ghcr.io/${{ github.repository_owner }}/websafety:9.7
            ghcr.io/${{ github.repository_owner }}/websafety:latest
          # On garde le cache pour ne pas tout re-télécharger à chaque fois
          cache-from: type=gha
          cache-to: type=gha,mode=max